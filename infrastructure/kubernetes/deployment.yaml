# =============================================================================
# HMIS — Kubernetes manifests (dev/reference)
# Node.js microservices + MySQL 8 + Redis + API gateway + Angular SPA.
# Apply with:
#   kubectl apply -f deployment.yaml
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: hmis
  labels: { app.kubernetes.io/part-of: hmis }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hmis-config
  namespace: hmis
data:
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "hmis"
  JWT_ISSUER: "hmis-auth"
  REDIS_URL: "redis://redis:6379"
  AUTH_URL:      "http://auth-service:8081"
  PATIENT_URL:   "http://patient-service:8082"
  DOCTOR_URL:    "http://doctor-service:8083"
  LAB_URL:       "http://lab-service:8084"
  PHARMACY_URL:  "http://pharmacy-service:8085"
  BILLING_URL:   "http://billing-service:8086"
  REPORTING_URL: "http://reporting-service:8087"

---
apiVersion: v1
kind: Secret
metadata:
  name: hmis-secret
  namespace: hmis
type: Opaque
stringData:
  DB_USER: "hmis"
  DB_PASS: "hmis"
  DB_ROOT_PASSWORD: "root"
  JWT_SECRET: "dev-secret-change-me-change-me-change-me-change-me-64chars"

# =============================================================================
# MySQL 8
# =============================================================================
---
apiVersion: v1
kind: Service
metadata: { name: mysql, namespace: hmis }
spec:
  clusterIP: None
  selector: { app: mysql }
  ports: [{ port: 3306, targetPort: 3306 }]

---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: mysql, namespace: hmis }
spec:
  serviceName: mysql
  replicas: 1
  selector: { matchLabels: { app: mysql } }
  template:
    metadata: { labels: { app: mysql } }
    spec:
      containers:
        - name: mysql
          image: mysql:8.3
          args:
            - --default-authentication-plugin=caching_sha2_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_0900_ai_ci
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: hmis-secret, key: DB_ROOT_PASSWORD } }
            - name: MYSQL_DATABASE
              valueFrom: { configMapKeyRef: { name: hmis-config, key: DB_NAME } }
            - name: MYSQL_USER
              valueFrom: { secretKeyRef: { name: hmis-secret, key: DB_USER } }
            - name: MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: hmis-secret, key: DB_PASS } }
          ports: [{ containerPort: 3306 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/mysql }]
          readinessProbe:
            exec: { command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"] }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 10Gi } }

# =============================================================================
# Redis
# =============================================================================
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: hmis }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: hmis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }

# =============================================================================
# Reusable snippet: each microservice has identical shape; only image + port
# differ. Kept inline for readability; replace with a Helm chart for prod.
# =============================================================================

# --- auth-service ------------------------------------------------------------
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: hmis }
spec:
  selector: { app: auth-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: hmis }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: hmis/auth-service:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          env:
            - { name: PORT,       value: "8081" }
            - { name: NODE_ENV,   value: "production" }
            - { name: DB_HOST,    valueFrom: { configMapKeyRef: { name: hmis-config, key: DB_HOST } } }
            - { name: DB_PORT,    valueFrom: { configMapKeyRef: { name: hmis-config, key: DB_PORT } } }
            - { name: DB_NAME,    valueFrom: { configMapKeyRef: { name: hmis-config, key: DB_NAME } } }
            - { name: JWT_ISSUER, valueFrom: { configMapKeyRef: { name: hmis-config, key: JWT_ISSUER } } }
            - { name: DB_USER,    valueFrom: { secretKeyRef:    { name: hmis-secret, key: DB_USER } } }
            - { name: DB_PASS,    valueFrom: { secretKeyRef:    { name: hmis-secret, key: DB_PASS } } }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef:    { name: hmis-secret, key: JWT_SECRET } } }
          readinessProbe: { httpGet: { path: /health, port: 8081 }, initialDelaySeconds: 10, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 8081 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: auth-service, namespace: hmis }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: auth-service }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }

