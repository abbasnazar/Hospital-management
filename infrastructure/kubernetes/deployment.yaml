# =============================================================================
# API Gateway
# =============================================================================
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: hmis }
spec:
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080 }]

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: hmis }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: hmis/api-gateway:local
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: hmis-config } }]
          env:
            - { name: PORT,       value: "8080" }
            - { name: NODE_ENV,   value: "production" }
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: hmis-secret, key: JWT_SECRET } } }
          readinessProbe: { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 5,  periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 8080 }, initialDelaySeconds: 30, periodSeconds: 30 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }

# =============================================================================
# Angular SPA
# =============================================================================
---
apiVersion: v1
kind: Service
metadata: { name: angular-app, namespace: hmis }
spec:
  selector: { app: angular-app }
  ports: [{ port: 80, targetPort: 80 }]

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: angular-app, namespace: hmis }
spec:
  replicas: 2
  selector: { matchLabels: { app: angular-app } }
  template:
    metadata: { labels: { app: angular-app } }
    spec:
      containers:
        - name: angular-app
          image: hmis/angular-app:local
          ports: [{ containerPort: 80 }]
          readinessProbe: { httpGet: { path: /, port: 80 }, initialDelaySeconds: 5,  periodSeconds: 10 }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }

# =============================================================================
# Ingress
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hmis-ingress
  namespace: hmis
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: hmis.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: api-gateway, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: angular-app, port: { number: 80 } } }
